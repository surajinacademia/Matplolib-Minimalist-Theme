[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "minimalist"
version = "2.0.0"
description = "A clean matplotlib style package for scientific figures"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
authors = [
    {name = "Suraj Sahu"},
]
keywords = [
    "matplotlib",
    "plotting",
    "scientific",
    "visualization",
    "style",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
    "matplotlib>=3.5.0",
    "numpy>=1.20.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "black",
    "ruff",
]

[project.urls]
Homepage = "https://github.com/surajinacademia/Matplolib-Minimalist-Theme"
Repository = "https://github.com/surajinacademia/Matplolib-Minimalist-Theme"

[tool.setuptools.packages.find]
where = ["."]
include = ["minimalist*"]

[tool.setuptools.package-data]
minimalist = ["styles/*.mplstyle"]

[tool.black]
line-length = 100
target-version = ["py38"]

[tool.ruff]
line-length = 100
target-version = "py38"